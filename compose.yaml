services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: guendlkofen
      POSTGRES_PASSWORD: guendlkofen
      POSTGRES_DB: guendlkofen
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U guendlkofen']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
